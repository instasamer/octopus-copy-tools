<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Octopus Copy Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#0a0a1a;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#toolbar{background:#1a1a2e;padding:10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border-bottom:2px solid #ff69b4;flex-shrink:0}
#toolbar h1{color:#ff69b4;font-size:14px;font-weight:bold;margin-right:8px;white-space:nowrap}
.page-btn{padding:6px 12px;border:1px solid #444;background:#2a2a3e;color:#ccc;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .2s}
.page-btn:hover{border-color:#ff69b4;color:#ff69b4}
.page-btn.active{background:#ff69b4;color:#fff;border-color:#ff69b4}
.page-btn .badge{background:#ff4444;color:#fff;border-radius:10px;padding:1px 5px;font-size:10px;margin-left:4px}
#controls{display:flex;gap:6px;margin-left:auto;align-items:center}
#controls button{padding:6px 12px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold}
#btn-highlight{background:#ff69b4;color:#fff}
#btn-export{background:#4CAF50;color:#fff}
#btn-reset{background:#666;color:#fff}
#change-counter{background:#333;color:#ff69b4;padding:4px 10px;border-radius:10px;font-size:12px;white-space:nowrap}
#main{flex:1;display:flex;overflow:hidden}
#iframe-container{flex:1;position:relative;overflow:hidden}
#site-iframe{width:100%;height:100%;border:none}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#ff69b4}
#loading .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#ff69b4;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
#export-panel{position:fixed;top:0;right:0;bottom:0;width:500px;background:#1a1a2e;border-left:2px solid #ff69b4;z-index:9999;display:none;flex-direction:column}
#export-panel.open{display:flex}
#export-header{padding:15px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
#export-header h3{color:#ff69b4}
#close-export{background:#333;border:none;color:#fff;padding:5px 10px;border-radius:5px;cursor:pointer}
#export-tabs{display:flex;border-bottom:1px solid #333}
.exp-tab{flex:1;padding:10px;text-align:center;cursor:pointer;background:#111;color:#666;border:none;font-size:13px}
.exp-tab.active{background:#1a1a2e;color:#ff69b4;border-bottom:2px solid #ff69b4}
#export-content{flex:1;padding:15px;overflow:auto}
#export-textarea{width:100%;height:calc(100% - 50px);background:#0a0a1a;color:#88ff88;border:1px solid #333;border-radius:6px;padding:10px;font-family:monospace;font-size:11px;resize:none}
#export-actions{padding:10px 15px;border-top:1px solid #333;display:flex;gap:8px}
.exp-btn{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:13px}
#btn-copy-export{background:#4CAF50;color:#fff}
#btn-download-export{background:#2196F3;color:#fff}
.status-bar{background:#111;padding:4px 15px;font-size:11px;color:#666;flex-shrink:0}
</style>
</head>
<body>
<div id="toolbar">
  <h1>🐙 Octopus Copy Editor</h1>
  <button class="page-btn" data-url="https://octopusenergy.es/" data-key="home">🏠 Home</button>
  <button class="page-btn" data-url="https://octopusenergy.es/precios" data-key="precios">⚡ Luz+Gas</button>
  <button class="page-btn" data-url="https://octopusenergy.es/solar" data-key="solar">☀️ Solar</button>
  <button class="page-btn" data-url="https://octopusenergy.es/bateria-para-placas-solares" data-key="baterias">🔋 Baterías</button>
  <button class="page-btn" data-url="https://octopusenergy.es/solar-wallet" data-key="wallet">💰 Solar Wallet</button>
  <button class="page-btn" data-url="https://octopusenergy.es/cargador-coche-electrico" data-key="cargador">🔌 Cargadores VE</button>
  <button class="page-btn" data-url="https://octopusenergy.es/tarifas-coche-electrico" data-key="tarifas-ev">🚗 Tarifas EV</button>
  <button class="page-btn" data-url="https://octopusenergy.es/aerotermia" data-key="aerotermia">♨️ Aerotermia</button>
  <button class="page-btn" data-url="https://octopusenergy.es/solar-autoconsumo-industrial" data-key="empresas">🏭 Solar Empresas</button>
  <button class="page-btn" data-url="https://octopusenergy.es/sobre-nosotros" data-key="nosotros">👥 Nosotros</button>
  <button class="page-btn" data-url="https://octopusenergy.es/nuestra-energia-verde" data-key="verde">🌱 Energía Verde</button>
  <button class="page-btn" data-url="https://octopusenergy.es/optimizar-potencia" data-key="potencia">📊 Potencia</button>
  <button class="page-btn" data-url="https://octopusenergy.es/precio-luz-hoy" data-key="precio-hoy">📈 Precio Hoy</button>
  <button class="page-btn" data-url="https://octopusenergy.es/universo-energetico-octopus" data-key="universo">🌊 Universo</button>
  <button class="page-btn" data-url="https://octopusenergy.es/precios/tarifa-solar" data-key="tarifa-solar">☀️ Tarifa Solar</button>
  <div id="controls">
    <span id="change-counter">0 cambios</span>
    <button id="btn-highlight">🎯 Ver textos</button>
    <button id="btn-export">📋 Exportar</button>
    <button id="btn-reset">↺ Reset</button>
  </div>
</div>
<div id="main">
  <div id="iframe-container">
    <div id="loading"><div class="spinner"></div><p>Selecciona una página arriba</p></div>
    <iframe id="site-iframe" sandbox="allow-same-origin allow-scripts allow-forms allow-popups" style="display:none"></iframe>
  </div>
</div>
<div class="status-bar" id="status-bar">✅ Editor listo — Selecciona una página para empezar</div>
<div id="export-panel">
  <div id="export-header"><h3>📋 Exportar cambios</h3><button id="close-export">✕ Cerrar</button></div>
  <div id="export-tabs">
    <button class="exp-tab active" data-tab="current">Página actual</button>
    <button class="exp-tab" data-tab="all">Todas</button>
    <button class="exp-tab" data-tab="changes">Solo cambios</button>
  </div>
  <div id="export-content"><textarea id="export-textarea" readonly placeholder="Los cambios aparecerán aquí..."></textarea></div>
  <div id="export-actions">
    <button class="exp-btn" id="btn-copy-export">📋 Copiar</button>
    <button class="exp-btn" id="btn-download-export">⬇️ Descargar JSON</button>
  </div>
</div>
<script>
const iframe = document.getElementById('site-iframe');
const loading = document.getElementById('loading');
const statusBar = document.getElementById('status-bar');
const changeCounter = document.getElementById('change-counter');
let allChanges = {};
let currentPageKey = null;
let currentPageBtn = null;
let totalChanges = 0;

const INJECT = `
(function(){
  if(window.__octoInjected) return;
  window.__octoInjected = true;
  window.__octoChanges = window.__octoChanges || {};
  
  function makeEditable(el) {
    if(el.__octoSetup) return;
    el.__octoSetup = true;
    const original = el.innerText || el.textContent;
    el.contentEditable = 'true';
    el.setAttribute('data-original', original);
    el.style.outline = 'none';
    el.style.cursor = 'text';
    el.addEventListener('focus', () => {
      el.style.outline = '2px solid #ff69b4';
      el.style.outlineOffset = '2px';
    });
    el.addEventListener('blur', () => {
      el.style.outline = 'none';
      const newText = el.innerText || el.textContent;
      if(newText !== original) {
        el.style.borderLeft = '3px solid #ff69b4';
        el.style.paddingLeft = '4px';
        const id = el.getAttribute('data-octo-id') || (el.tagName + '_' + Math.random().toString(36).substr(2,6));
        el.setAttribute('data-octo-id', id);
        window.__octoChanges[id] = { original, newText, tag: el.tagName, path: el.className };
        window.parent.postMessage({ type: 'octo-change', count: Object.keys(window.__octoChanges).length, changes: window.__octoChanges }, '*');
      }
    });
  }
  
  function scanAndEdit() {
    const skip = new Set(['SCRIPT','STYLE','NOSCRIPT','IFRAME','INPUT','TEXTAREA','SELECT','BUTTON','IMG','SVG','LINK','META','HEAD']);
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        const t = node.textContent.trim();
        if(!t || t.length < 3) return NodeFilter.FILTER_REJECT;
        const p = node.parentElement;
        if(!p || skip.has(p.tagName)) return NodeFilter.FILTER_REJECT;
        if(p.children.length === 0) return NodeFilter.FILTER_ACCEPT;
        return NodeFilter.FILTER_REJECT;
      }
    });
    const nodes = [];
    while(walker.nextNode()) nodes.push(walker.currentNode.parentElement);
    nodes.forEach(makeEditable);
    return nodes.length;
  }
  
  function highlightAll() {
    document.querySelectorAll('[contenteditable=true]').forEach(el => {
      el.style.outline = '2px solid rgba(255,105,180,0.8)';
      el.style.background = 'rgba(255,105,180,0.05)';
      setTimeout(() => { el.style.outline = ''; el.style.background = ''; }, 3000);
    });
  }
  
  window.addEventListener('message', (e) => {
    if(e.data && e.data.type === 'octo-scan') {
      const count = scanAndEdit();
      window.parent.postMessage({ type: 'octo-ready', count }, '*');
    }
    if(e.data && e.data.type === 'octo-highlight') highlightAll();
    if(e.data && e.data.type === 'octo-get-changes') {
      window.parent.postMessage({ type: 'octo-changes-data', changes: window.__octoChanges }, '*');
    }
  });
  
  // Auto-scan after a delay
  setTimeout(() => {
    const count = scanAndEdit();
    window.parent.postMessage({ type: 'octo-ready', count }, '*');
  }, 2000);
})();
`;

window.addEventListener('message', (e) => {
  if(!e.data) return;
  if(e.data.type === 'octo-ready') {
    statusBar.textContent = '✅ ' + (currentPageBtn ? currentPageBtn.textContent.trim() : '') + ' — ' + e.data.count + ' textos editables. Haz clic en cualquier texto para editar.';
  }
  if(e.data.type === 'octo-change') {
    if(currentPageKey) allChanges[currentPageKey] = e.data.changes;
    totalChanges = Object.values(allChanges).reduce((acc, v) => acc + Object.keys(v).length, 0);
    changeCounter.textContent = totalChanges + ' cambio' + (totalChanges !== 1 ? 's' : '');
    if(currentPageBtn) {
      let badge = currentPageBtn.querySelector('.badge');
      const pageCount = Object.keys(e.data.changes).length;
      if(!badge) { badge = document.createElement('span'); badge.className = 'badge'; currentPageBtn.appendChild(badge); }
      badge.textContent = pageCount;
    }
  }
  if(e.data.type === 'octo-changes-data') updateExportPanel(e.data.changes);
});

function loadPage(btn) {
  if(currentPageBtn) currentPageBtn.classList.remove('active');
  btn.classList.add('active');
  currentPageBtn = btn;
  currentPageKey = btn.dataset.key;
  const url = btn.dataset.url;
  
  loading.style.display = 'block';
  loading.innerHTML = '<div class="spinner"></div><p>Cargando ' + btn.textContent.trim() + '...</p>';
  iframe.style.display = 'none';
  statusBar.textContent = '⏳ Cargando ' + url + '...';
  
  iframe.src = url;
  iframe.onload = () => {
    loading.style.display = 'none';
    iframe.style.display = 'block';
    try {
      const script = iframe.contentDocument.createElement('script');
      script.textContent = INJECT;
      iframe.contentDocument.head.appendChild(script);
    } catch(e) {
      iframe.contentWindow.postMessage({ type: 'octo-scan' }, '*');
    }
    setTimeout(() => iframe.contentWindow.postMessage({ type: 'octo-scan' }, '*'), 500);
  };
}

document.querySelectorAll('.page-btn').forEach(btn => {
  btn.addEventListener('click', () => loadPage(btn));
});

document.getElementById('btn-highlight').addEventListener('click', () => {
  try { iframe.contentWindow.postMessage({ type: 'octo-highlight' }, '*'); }
  catch(e) { statusBar.textContent = '⚠️ No hay página cargada'; }
});

document.getElementById('btn-reset').addEventListener('click', () => {
  if(confirm('¿Resetear todos los cambios?')) {
    allChanges = {};
    totalChanges = 0;
    changeCounter.textContent = '0 cambios';
    document.querySelectorAll('.page-btn .badge').forEach(b => b.remove());
    if(currentPageBtn) loadPage(currentPageBtn);
  }
});

let currentExportTab = 'current';
function openExport() {
  document.getElementById('export-panel').classList.add('open');
  refreshExport();
}
function closeExport() { document.getElementById('export-panel').classList.remove('open'); }
function refreshExport() {
  let data;
  if(currentExportTab === 'current') {
    data = currentPageKey ? { [currentPageKey]: allChanges[currentPageKey] || {} } : {};
  } else if(currentExportTab === 'all') {
    data = allChanges;
  } else {
    data = {};
    Object.entries(allChanges).forEach(([page, changes]) => {
      const filtered = Object.entries(changes).filter(([,v]) => v.newText !== v.original);
      if(filtered.length) data[page] = Object.fromEntries(filtered);
    });
  }
  document.getElementById('export-textarea').value = JSON.stringify(data, null, 2);
}
function updateExportPanel(changes) {
  if(currentPageKey) allChanges[currentPageKey] = changes;
  refreshExport();
}

document.getElementById('btn-export').addEventListener('click', openExport);
document.getElementById('close-export').addEventListener('click', closeExport);
document.getElementById('export-panel').addEventListener('click', e => { if(e.target === document.getElementById('export-panel')) closeExport(); });

document.querySelectorAll('.exp-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.exp-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentExportTab = tab.dataset.tab;
    if(currentExportTab === 'current' && currentPageKey) {
      iframe.contentWindow.postMessage({ type: 'octo-get-changes' }, '*');
    } else {
      refreshExport();
    }
  });
});

document.getElementById('btn-copy-export').addEventListener('click', () => {
  const ta = document.getElementById('export-textarea');
  ta.select();
  document.execCommand('copy');
  document.getElementById('btn-copy-export').textContent = '✅ Copiado';
  setTimeout(() => { document.getElementById('btn-copy-export').textContent = '📋 Copiar'; }, 2000);
});

document.getElementById('btn-download-export').addEventListener('click', () => {
  const content = document.getElementById('export-textarea').value;
  const blob = new Blob([content], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'octopus-changes-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key === 's') { e.preventDefault(); openExport(); }
  if(e.ctrlKey && e.key === 'e') { e.preventDefault(); openExport(); }
  if(e.key === 'Escape') closeExport();
});
</script>
</body>
</html>
